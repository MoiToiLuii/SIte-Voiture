    </div>
</div>

<script>
function ouvrirPopup(modele) {
    const contenu = document.getElementById("contenu-popup");

    const descriptions = {
        clio: "Renault Clio – Citadine polyvalente, idéale pour la ville et les trajets quotidiens. Très faible consommation, excellente maniabilité. Puissance : environ 90 ch.",

        classec: "Mercedes-Benz Classe C – Berline premium alliant confort, élégance et technologies modernes. Très agréable sur route, excellente insonorisation et finitions haut de gamme. Puissance : environ 170 ch.",
        classee: "Mercedes-Benz Classe E – Grande berline luxueuse, idéale pour les longs trajets. Confort exceptionnel, technologies avancées, conduite douce et moteur puissant. Puissance : environ 200 ch.",
        serie3: "BMW Série 3 – Berline sportive réputée pour son dynamisme et son plaisir de conduite. Direction précise, châssis équilibré et moteurs performants. Puissance : environ 184 ch.",
        a4: "Audi A4 – Berline premium élégante et technologique. Confort remarquable, finition impeccable et conduite précise. Idéale pour les trajets quotidiens comme pour l’autoroute. Puissance : environ 150 ch.",
        x1: "BMW X1 – SUV compact dynamique et polyvalent. Position de conduite haute, très bonne tenue de route et habitacle spacieux. Parfait pour la ville comme pour les escapades. Puissance : environ 150 ch.",

    };

    contenu.innerHTML = "<p>" + descriptions[modele] + "</p>";
    document.getElementById("popup").style.display = "flex";
}

function fermerPopup() {
    document.getElementById("popup").style.display = "none";
}
</script>
